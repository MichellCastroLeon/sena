<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>

<div class="logo">Glowtica</div>

<nav>

<ul>

<li><a href="inicio.html">Inicio</a></li>
<li><a href="productos.html">Productos</a></li>

</ul>

</nav>

</header>

<section class="formulario">

<h2>Encuesta de Preferencias</h2>

<form>

<label>Nombre de Usuario</label>
<input type="text" required>

<label>¿Qué productos te interesan?</label>

<select>
<option>Cabello</option>
<option>Cuidado Facial</option>
<option>Maquillaje</option>
<option>Cuidado Corporal</option>
</select>

<label>Tipo de piel</label>

<select>
<option>Grasa</option>
<option>Mixta</option>
<option>Seca</option>
<option>Sensible</option>
<option>Normal</option>
</select>

<label>Tipo de cabello</label>

<select>
<option>Liso</option>
<option>Ondulado</option>
<option>Rizado</option>
<option>Crespo</option>
</select>

<label>¿Prefieres productos veganos?</label>

<select>
<option>Sí</option>
<option>No</option>
<option>No importa</option>
</select>

<label>¿Con qué frecuencia compras productos de belleza?</label>

<select>
<option>Cada semana</option>
<option>Cada mes</option>
<option>Cada 3 meses</option>
<option>Solo cuando necesito</option>
</select>

<label>¿Cuál es tu presupuesto?</label>

<select>
<option>Menos de $50.000</option>
<option>$50.000 - $100.000</option>
<option>Más de $100.000</option>
</select>

<label>Comentarios</label>

<textarea rows="5"></textarea>

<input type="submit" value="Enviar Encuesta">

</form>

</section>

</body>

</html>
